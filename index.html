<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Finance - Standalone</title>
  
  <!-- CDN Links: React, Babel, Tailwind, Lucide -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Tailwind Custom Configuration -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            neutral: {
              850: '#202020',
              950: '#0a0a0a',
            }
          }
        }
      }
    }
  </script>

  <style type="text/css">
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleUp {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fadeIn { animation: fadeIn 0.25s ease-out forwards; }
    .animate-scaleUp { animation: scaleUp 0.2s ease-out forwards; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #404040; }

    @media print {
      body { background: white !important; color: black !important; }
      .print\:hidden { display: none !important; }
      .print-container { border: none !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
    }
  </style>
</head>
<body class="bg-neutral-50 dark:bg-neutral-950 text-neutral-800 dark:text-neutral-100 min-h-screen transition-colors duration-300">
  <div id="root"></div>

  <!-- React Standalone App inside Babel Script Container -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // -------------------------------------------------------------
    // Dynamic Lucide Icon Component Helper
    // -------------------------------------------------------------
    const LucideIcon = ({ name, className = "w-4 h-4" }) => {
      const iconRef = useRef(null);

      useEffect(() => {
        if (iconRef.current && window.lucide) {
          iconRef.current.innerHTML = '';
          const i = document.createElement('i');
          i.setAttribute('data-lucide', name);
          i.className = className;
          iconRef.current.appendChild(i);
          window.lucide.createIcons();
        }
      }, [name, className]);

      return <span ref={iconRef} className="inline-flex items-center justify-center shrink-0" />;
    };

    // -------------------------------------------------------------
    // Default Fallback Mock Data Definitions
    // -------------------------------------------------------------
    const defaultCards = [
      { id: "card-1", name: "Nubank Ultra", lastFour: "4829", limit: 12000, spent: 2478.5, dueDate: 10, closingDate: 3, network: "mastercard", color: "from-[#8A05BE] to-[#510472]" },
      { id: "card-2", name: "Itaú Platinum", lastFour: "9312", limit: 25000, spent: 1240.0, dueDate: 15, closingDate: 8, network: "visa", color: "from-[#EC7000] to-[#A33D00]" },
      { id: "card-3", name: "Inter Black", lastFour: "0540", limit: 15000, spent: 600.0, dueDate: 25, closingDate: 18, network: "mastercard", color: "from-neutral-800 to-neutral-950" }
    ];

    const defaultCategories = [
      { id: "cat-1", name: "Alimentação", color: "#EC6E34", icon: "Utensils", budget: 800 },
      { id: "cat-2", name: "Transporte", color: "#3B82F6", icon: "Car", budget: 400 },
      { id: "cat-3", name: "Lazer", color: "#8B5CF6", icon: "Gamepad", budget: 600 },
      { id: "cat-4", name: "Moradia", color: "#10B981", icon: "Home", budget: 2500 },
      { id: "cat-5", name: "Saúde", color: "#F43F5E", icon: "Heart", budget: 300 },
      { id: "cat-6", name: "Mercado", color: "#F59E0B", icon: "ShoppingBag", budget: 1000 },
      { id: "cat-7", name: "Outros", color: "#64748B", icon: "Percent", budget: 500 }
    ];

    const defaultTransactions = [
      { id: "tx-1", description: "Supermercado Carrefour", value: 345.8, date: new Date(Date.now() - 86400000).toISOString().split('T')[0], category: "Mercado", type: "Débito", isPaid: true },
      { id: "tx-2", description: "Uber Corrida", value: 24.5, date: new Date().toISOString().split('T')[0], category: "Transporte", cardId: "card-1", type: "Crédito", isPaid: true },
      { id: "tx-3", description: "Almoço Executivo", value: 68.0, date: new Date(Date.now() - 172800000).toISOString().split('T')[0], category: "Alimentação", type: "Pix", isPaid: true },
      { id: "tx-4", description: "Mensalidade Netflix", value: 55.9, date: new Date(Date.now() - 432000000).toISOString().split('T')[0], category: "Lazer", cardId: "card-1", type: "Crédito", isPaid: true },
      { id: "tx-5", description: "Combustível Posto Ipiranga", value: 150.0, date: new Date(Date.now() - 259200000).toISOString().split('T')[0], category: "Transporte", cardId: "card-2", type: "Crédito", isPaid: true },
      { id: "tx-6", description: "Aluguel Apartamento", value: 1800.0, date: new Date(Date.now() - 864000000).toISOString().split('T')[0], category: "Moradia", type: "Pix", isPaid: true },
      { id: "tx-7", description: "Farmácia Pague Menos", value: 84.6, date: new Date(Date.now() - 691200000).toISOString().split('T')[0], category: "Saúde", cardId: "card-1", type: "Crédito", isPaid: true },
      { id: "tx-8", description: "Cinemark Pipoca", value: 72.0, date: new Date(Date.now() - 1036800000).toISOString().split('T')[0], category: "Lazer", cardId: "card-3", type: "Crédito", isPaid: true },
      { id: "tx-9", description: "Luz Enel Distribuidora", value: 234.15, date: new Date(Date.now() - 518400000).toISOString().split('T')[0], category: "Moradia", type: "Boleto", isPaid: true },
      { id: "tx-10", description: "Compra Sushi Delivery", value: 120.0, date: new Date(Date.now() - 345600000).toISOString().split('T')[0], category: "Alimentação", type: "Pix", isPaid: true }
    ];

    const defaultReminders = [
      { id: "rem-1", title: "Internet Virtua", value: 129.9, dueDate: new Date(Date.now() + 345600000).toISOString().split('T')[0], category: "Moradia", isPaid: false, notified: false, autoDebit: true },
      { id: "rem-2", title: "Plano de Saúde Unimed", value: 450.0, dueDate: new Date(Date.now() + 172800000).toISOString().split('T')[0], category: "Saúde", isPaid: false, notified: false, autoDebit: false },
      { id: "rem-3", title: "Academia SmartFit", value: 119.9, dueDate: new Date(Date.now() + 691200000).toISOString().split('T')[0], category: "Lazer", isPaid: false, notified: false, autoDebit: true },
      { id: "rem-4", title: "Condomínio Alvorada", value: 380.0, dueDate: new Date(Date.now() - 259200000).toISOString().split('T')[0], category: "Moradia", isPaid: true, notified: true, autoDebit: false }
    ];

    const defaultBanks = [
      { id: "bank-1", bankName: "Nubank", connected: false, type: "OpenFinance" },
      { id: "bank-2", bankName: "Itaú", connected: false, type: "OpenFinance" },
      { id: "bank-3", bankName: "Bradesco", connected: false, type: "OpenFinance" },
      { id: "bank-4", bankName: "Banco Inter", connected: false, type: "OpenFinance" },
      { id: "bank-5", bankName: "Santander", connected: false, type: "OpenFinance" },
    ];

    // -------------------------------------------------------------
    // Intelligent SMS / Receipt Parser Simulation function
    // -------------------------------------------------------------
    function simulateParsing(text) {
      const clean = text.toLowerCase();
      let value = 0;
      let description = "Compra por Inteligência Artificial";
      let category = "Outros";
      let paymentMethod = "Pix";

      const moneyMatch = text.match(/(?:r\$|reais)\s*([0-9.,]+)/i) || text.match(/([0-9.,]+)\s*(?:reais|r\$)/i) || text.match(/(?:pago|transferido|valor de)\s*([0-9.,]+)/i);
      if (moneyMatch) {
        const numStr = moneyMatch[1].replace(/\./g, "").replace(",", ".");
        value = parseFloat(numStr) || 0;
      }

      if (clean.includes("uber") || clean.includes("pop") || clean.includes("taxi")) {
        description = "Uber / Transporte";
        category = "Transporte";
        paymentMethod = "Crédito";
      } else if (clean.includes("ifood") || clean.includes("restaurante") || clean.includes("mcdonald") || clean.includes("burger") || clean.includes("sushi")) {
        description = "Almoço / Restaurante";
        category = "Alimentação";
        paymentMethod = "Crédito";
      } else if (clean.includes("supermercado") || clean.includes("carrefour") || clean.includes("pao de acucar") || clean.includes("mercado")) {
        description = "Supermercado";
        category = "Mercado";
        paymentMethod = "Débito";
      } else if (clean.includes("farmacia") || clean.includes("droga") || clean.includes("medicamente") || clean.includes("hospital")) {
        description = "Farmácia / Saúde";
        category = "Saúde";
        paymentMethod = "Débito";
      } else if (clean.includes("netflix") || clean.includes("spotify") || clean.includes("cinema") || clean.includes("smartfit") || clean.includes("academia")) {
        description = "Lazer / Entretenimento";
        category = "Lazer";
        paymentMethod = "Crédito";
      } else if (clean.includes("aluguel") || clean.includes("condominio") || clean.includes("enel") || clean.includes("luz") || clean.includes("internet")) {
        description = "Despesa Fixa Casa";
        category = "Moradia";
        paymentMethod = "Boleto";
      }

      if (clean.includes("pix")) paymentMethod = "Pix";
      else if (clean.includes("cartão") || clean.includes("credito")) paymentMethod = "Crédito";
      else if (clean.includes("debito")) paymentMethod = "Débito";

      return {
        value: value || 42.50,
        description,
        category,
        paymentMethod,
        date: new Date().toISOString().split("T")[0]
      };
    }

    // -------------------------------------------------------------
    // Main Standalone React Application
    // -------------------------------------------------------------
    function App() {
      // PERSISTENT DATA STATE
      const [cards, setCards] = useState(() => {
        const saved = localStorage.getItem("easy_finance_cards");
        return saved ? JSON.parse(saved) : defaultCards;
      });

      const [categories, setCategories] = useState(() => {
        const saved = localStorage.getItem("easy_finance_categories");
        return saved ? JSON.parse(saved) : defaultCategories;
      });

      const [transactions, setTransactions] = useState(() => {
        const saved = localStorage.getItem("easy_finance_transactions");
        return saved ? JSON.parse(saved) : defaultTransactions;
      });

      const [reminders, setReminders] = useState(() => {
        const saved = localStorage.getItem("easy_finance_reminders");
        return saved ? JSON.parse(saved) : defaultReminders;
      });

      const [banks, setBanks] = useState(() => {
        const saved = localStorage.getItem("easy_finance_banks");
        return saved ? JSON.parse(saved) : defaultBanks;
      });

      const [settings, setSettings] = useState(() => {
        const saved = localStorage.getItem("easy_finance_settings");
        return saved ? JSON.parse(saved) : {
          darkMode: true,
          biometricEnabled: true,
          pushNotificationsEnabled: true,
          syncOnStartup: true,
        };
      });

      const [activeTab, setActiveTab] = useState("dashboard");
      const [inAppToast, setInAppToast] = useState(null);
      const [isExporting, setIsExporting] = useState(false);

      // SAVE TO LOCALSTORAGE ON MUTATION
      useEffect(() => { localStorage.setItem("easy_finance_cards", JSON.stringify(cards)); }, [cards]);
      useEffect(() => { localStorage.setItem("easy_finance_categories", JSON.stringify(categories)); }, [categories]);
      useEffect(() => { localStorage.setItem("easy_finance_transactions", JSON.stringify(transactions)); }, [transactions]);
      useEffect(() => { localStorage.setItem("easy_finance_reminders", JSON.stringify(reminders)); }, [reminders]);
      useEffect(() => { localStorage.setItem("easy_finance_banks", JSON.stringify(banks)); }, [banks]);
      useEffect(() => {
        localStorage.setItem("easy_finance_settings", JSON.stringify(settings));
        if (settings.darkMode) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      }, [settings]);

      // RECOMPUTE CREDIT CARD BILL SPENDING
      useEffect(() => {
        setCards((prevCards) =>
          prevCards.map((card) => {
            const spent = transactions
              .filter((t) => t.cardId === card.id)
              .reduce((sum, t) => sum + t.value, 0);
            return { ...card, spent };
          })
        );
      }, [transactions]);

      // HELPERS
      const triggerToast = (msg) => {
        setInAppToast(msg);
        setTimeout(() => setInAppToast(null), 4000);
      };

      const handleAddTransaction = (newTx) => {
        const tx = { ...newTx, id: "tx-" + Math.random().toString(36).substring(2, 9) };
        setTransactions(prev => [tx, ...prev]);
        triggerToast(`Transação "${tx.description}" lançada!`);
      };

      const handleAddCard = (newCard) => {
        const card = { ...newCard, id: "card-" + Math.random().toString(36).substring(2, 9), spent: 0 };
        setCards(prev => [...prev, card]);
        triggerToast(`Cartão "${card.name}" adicionado.`);
      };

      const handleDeleteCard = (cardId) => {
        setCards(prev => prev.filter(c => c.id !== cardId));
        setTransactions(prev => prev.map(t => t.cardId === cardId ? { ...t, cardId: undefined } : t));
        triggerToast("Cartão removido.");
      };

      const handleAddCategory = (newCat) => {
        setCategories(prev => [...prev, newCat]);
        triggerToast(`Categoria "${newCat.name}" criada.`);
      };

      const handleDeleteCategory = (catId) => {
        const cat = categories.find(c => c.id === catId);
        if (!cat) return;
        setCategories(prev => prev.filter(c => c.id !== catId));
        setTransactions(prev => prev.map(t => t.category === cat.name ? { ...t, category: "Outros" } : t));
        triggerToast(`Categoria "${cat.name}" removida.`);
      };

      const handleAddReminder = (newRem) => {
        const rem = { ...newRem, id: "rem-" + Math.random().toString(36).substring(2, 9), notified: false };
        setReminders(prev => [...prev, rem]);
        triggerToast(`Conta agendada.`);
      };

      const handleToggleReminderPaid = (remId) => {
        const rem = reminders.find(r => r.id === remId);
        if (!rem) return;
        const nextPaid = !rem.isPaid;
        setReminders(prev => prev.map(r => r.id === remId ? { ...r, isPaid: nextPaid } : r));

        if (nextPaid) {
          handleAddTransaction({
            description: rem.title,
            value: rem.value,
            date: new Date().toISOString().split("T")[0],
            category: rem.category,
            type: "Boleto",
            isPaid: true
          });
        }
      };

      const handleToggleBankConnection = (bankId, isConnected, mockTrans, mockCards) => {
        setBanks(prev => prev.map(b => b.id === bankId ? { ...b, connected: isConnected, lastSync: isConnected ? new Date().toLocaleDateString("pt-BR") : undefined } : b));
        if (isConnected && mockTrans) setTransactions(prev => [...mockTrans, ...prev]);
        if (isConnected && mockCards) setCards(prev => [...prev, ...mockCards]);
        
        const bName = banks.find(b => b.id === bankId)?.bankName;
        triggerToast(isConnected ? `Banco "${bName}" conectado via Open Finance!` : `Conexão com "${bName}" desfeita.`);
      };

      // BACKUP EXPORTS
      const handleLocalExport = () => {
        const dataStr = JSON.stringify({ cards, categories, transactions, reminders, banks });
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `easy_finance_backup_${new Date().toISOString().split("T")[0]}.json`;
        link.click();
        URL.revokeObjectURL(url);
      };

      const handleLocalImport = (fileContent) => {
        try {
          const parsed = JSON.parse(fileContent);
          if (parsed.cards) setCards(parsed.cards);
          if (parsed.categories) setCategories(parsed.categories);
          if (parsed.transactions) setTransactions(parsed.transactions);
          if (parsed.reminders) setReminders(parsed.reminders);
          if (parsed.banks) setBanks(parsed.banks);
          triggerToast("Backup importado com sucesso!");
        } catch (e) {
          alert("Erro ao decodificar o arquivo de backup local.");
        }
      };

      // MATH METRICS FOR CARDS
      const totalPaid = useMemo(() => transactions.filter(t => t.isPaid).reduce((sum, t) => sum + t.value, 0), [transactions]);
      const activeUnpaidBills = useMemo(() => reminders.filter(r => !r.isPaid).reduce((sum, r) => sum + r.value, 0), [reminders]);
      const creditFaturasTotal = useMemo(() => cards.reduce((sum, c) => sum + c.spent, 0), [cards]);

      return (
        <div className="min-h-screen bg-neutral-100 dark:bg-neutral-950 text-neutral-800 dark:text-neutral-150 transition-colors flex flex-col">
          {/* Header */}
          <header className="border-b border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 sticky top-0 z-40 print:hidden transition-colors">
            <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-3">
              <div className="flex items-center gap-2.5">
                <span className="w-9 h-9 bg-indigo-500 text-white font-bold flex items-center justify-center rounded-xl shadow-md text-lg">R$</span>
                <div>
                  <h1 className="font-bold text-neutral-850 dark:text-neutral-100 text-base leading-none flex items-center gap-2">
                    Easy Finance
                    <span className="text-[10px] bg-indigo-100 text-indigo-800 dark:bg-indigo-950/70 dark:text-indigo-400 px-1.5 py-0.5 rounded-full font-bold">Standalone</span>
                  </h1>
                  <p className="text-[10px] text-neutral-400 dark:text-neutral-500 mt-1">Planejamento financeiro offline e 100% autônomo</p>
                </div>
              </div>

              <nav className="flex bg-neutral-100 dark:bg-neutral-800 p-1 rounded-xl">
                {[
                  { id: "dashboard", label: "Dashboard" },
                  { id: "cards", label: "Cartões & Open Finance" },
                  { id: "reminders", label: "Boletos" },
                  { id: "categories", label: "Configurar" }
                ].map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`text-xs px-3.5 py-1.5 rounded-lg font-semibold transition-all cursor-pointer ${
                      activeTab === tab.id
                        ? "bg-white dark:bg-neutral-900 text-indigo-600 dark:text-indigo-400 font-bold shadow-xs"
                        : "text-neutral-500 hover:text-neutral-800 dark:hover:text-neutral-200"
                    }`}
                  >
                    {tab.label}
                  </button>
                ))}
              </nav>
            </div>
          </header>

          {/* Core Body Container */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 space-y-6 print:p-0">
            {/* Metric Indicator Widgets */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-5 print:hidden">
              <div className="bg-white dark:bg-neutral-900 p-5 rounded-2xl border border-neutral-200 dark:border-neutral-800 shadow-sm flex items-center justify-between">
                <div>
                  <span className="text-xs text-neutral-400 dark:text-neutral-500 font-medium">Lançamentos Pagos</span>
                  <h2 className="text-2xl font-bold mt-1 text-neutral-850 dark:text-neutral-100">R$ {totalPaid.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</h2>
                </div>
                <div className="p-3 bg-emerald-50 dark:bg-emerald-950/40 text-emerald-500 rounded-xl"><LucideIcon name="Wallet" className="w-5 h-5" /></div>
              </div>

              <div className="bg-white dark:bg-neutral-900 p-5 rounded-2xl border border-neutral-200 dark:border-neutral-800 shadow-sm flex items-center justify-between">
                <div>
                  <span className="text-xs text-neutral-400 dark:text-neutral-500 font-medium">Contas em Aberto</span>
                  <h2 className="text-2xl font-bold mt-1 text-neutral-850 dark:text-neutral-100">R$ {activeUnpaidBills.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</h2>
                </div>
                <div className="p-3 bg-rose-50 dark:bg-rose-950/40 text-rose-500 rounded-xl"><LucideIcon name="Bell" className="w-5 h-5" /></div>
              </div>

              <div className="bg-white dark:bg-neutral-900 p-5 rounded-2xl border border-neutral-200 dark:border-neutral-800 shadow-sm flex items-center justify-between">
                <div>
                  <span className="text-xs text-neutral-400 dark:text-neutral-500 font-medium">Faturas Consolidadas</span>
                  <h2 className="text-2xl font-bold mt-1 text-neutral-850 dark:text-neutral-100">R$ {creditFaturasTotal.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</h2>
                </div>
                <div className="p-3 bg-indigo-50 dark:bg-indigo-950/40 text-indigo-500 rounded-xl"><LucideIcon name="CreditCard" className="w-5 h-5" /></div>
              </div>
            </div>

            {/* TAB CONTENT */}
            {activeTab === "dashboard" && (
              <div className="space-y-6 animate-fadeIn">
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  {/* Transaction form input */}
                  <div className="lg:col-span-2">
                    <TransactionForm categories={categories} cards={cards} onAddTransaction={handleAddTransaction} />
                  </div>

                  {/* Interative widgets sidebar */}
                  <div>
                    <WidgetsModule transactions={transactions} reminders={reminders} categories={categories} onQuickLaunch={(preset) => handleAddTransaction({ ...preset, date: new Date().toISOString().split("T")[0], isPaid: true })} />
                  </div>
                </div>

                {/* Dashboard charts section */}
                <ChartsDashboard transactions={transactions} categories={categories} />

                {/* Transaction history list ledger */}
                <TransactionHistory transactions={transactions} categories={categories} cards={cards} onDeleteTransaction={(id) => setTransactions(prev => prev.filter(t => t.id !== id))} onToggleStatus={(id) => setTransactions(prev => prev.map(t => t.id === id ? { ...t, isPaid: !t.isPaid } : t))} onExportReport={() => setIsExporting(true)} />
              </div>
            )}

            {activeTab === "cards" && (
              <div className="space-y-6 animate-fadeIn">
                <CreditCardList cards={cards} onAddCard={handleAddCard} onDeleteCard={handleDeleteCard} biometricEnabled={settings.biometricEnabled} />
                <IntegrationWizard banks={banks} onToggleBankConnection={handleToggleBankConnection} />
              </div>
            )}

            {activeTab === "reminders" && (
              <div className="space-y-6 animate-fadeIn">
                <RemindersModule reminders={reminders} onAddReminder={handleAddReminder} onToggleReminderPaid={handleToggleReminderPaid} onDeleteReminder={(id) => setReminders(prev => prev.filter(r => r.id !== id))} pushEnabled={settings.pushNotificationsEnabled} onToast={triggerToast} />
              </div>
            )}

            {activeTab === "categories" && (
              <div className="space-y-6 animate-fadeIn">
                <CategoryCustomizer categories={categories} onAddCategory={handleAddCategory} onDeleteCategory={handleDeleteCategory} onUpdateBudget={(id, val) => setCategories(prev => prev.map(c => c.id === id ? { ...c, budget: val } : c))} />
                <CloudSecurityPanel settings={settings} onUpdateSettings={(set) => setSettings(prev => ({ ...prev, ...set }))} onLocalExport={handleLocalExport} onLocalImport={handleLocalImport} />
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="border-t border-neutral-200 dark:border-neutral-800 py-4 bg-white dark:bg-neutral-900 transition-colors text-center select-none text-[10px] text-neutral-400 dark:text-neutral-500 print:hidden mt-auto">

    // -------------------------------------------------------------
    // Charts Dashboard Component
    // -------------------------------------------------------------
    function ChartsDashboard({ transactions, categories }) {
      const computedData = useMemo(() => {
        const map = {};
        transactions.forEach(t => {
          if (t.isPaid) {
            map[t.category] = (map[t.category] || 0) + t.value;
          }
        });
        return categories.map(c => ({
          name: c.name,
          value: map[c.name] || 0,
          color: c.color
        })).filter(item => item.value > 0);
      }, [transactions, categories]);

      const grandTotal = computedData.reduce((sum, item) => sum + item.value, 0);

      // Simple HTML SVG Render calculations for high visual quality
      let accumAngle = 0;
      const donutR = 50;
      const strokeW = 14;
      const circumference = 2 * Math.PI * donutR;

      return (
        <div className="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl p-6 shadow-sm space-y-6">
          <div>
            <h3 className="font-semibold text-neutral-850 dark:text-neutral-100 text-base">Dashboard Gráfico de Distribuição</h3>
            <p className="text-xs text-neutral-400">Visão setorial das suas despesas líquidas faturadas no mês.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
            {/* SVG Donut Chart */}
            <div className="flex justify-center relative items-center">
              {grandTotal === 0 ? (
                <div className="text-xs text-neutral-400 text-center py-10">Nenhum lançamento pago para desenhar fatias.</div>
              ) : (
                <div className="relative w-44 h-44">
                  <svg viewBox="0 0 120 120" className="w-full h-full transform -rotate-90">
                    <circle cx="60" cy="60" r={donutR} fill="transparent" stroke="#e2e8f0" strokeWidth={strokeW} className="opacity-10 dark:opacity-5" />
                    {computedData.map((item, idx) => {
                      const share = item.value / grandTotal;
                      const strokeDash = share * circumference;
                      const offset = (accumAngle / 360) * circumference;
                      accumAngle += share * 360;

                      return (
                        <circle
                          key={idx}
                          cx="60"
                          cy="60"
                          r={donutR}
                          fill="transparent"
                          stroke={item.color}
                          strokeWidth={strokeW}
                          strokeDasharray={`${strokeDash} ${circumference}`}
                          strokeDashoffset={-offset}
                          className="transition-all duration-300"
                        />
                      );
                    })}
                  </svg>
                  <div className="absolute inset-0 flex flex-col justify-center items-center text-center select-none">
                    <span className="text-[9px] text-neutral-400 uppercase tracking-widest font-semibold">Total Pago</span>
                    <span className="text-sm font-extrabold text-neutral-850 dark:text-neutral-100">R$ {grandTotal.toFixed(0)}</span>
                  </div>
                </div>
              )}
            </div>

            {/* Legend / Bar lists */}
            <div className="space-y-3.5">
              <h4 className="text-[10px] font-bold uppercase text-neutral-400">Classificação Setorial</h4>
              {computedData.length === 0 ? (
                <p className="text-xs text-neutral-400 italic">Nenhum setor com faturas líquidas.</p>
              ) : (
                <div className="space-y-2.5 max-h-[180px] overflow-y-auto pr-1">
                  {computedData.sort((a,b) => b.value - a.value).map((item, idx) => {
                    const pct = grandTotal > 0 ? (item.value / grandTotal) * 100 : 0;
                    return (
                      <div key={idx} className="text-xs space-y-1">
                        <div className="flex justify-between items-center font-semibold text-neutral-700 dark:text-neutral-300">
                          <span className="flex items-center gap-2"><span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: item.color }} /> {item.name}</span>
                          <span className="font-bold">R$ {item.value.toFixed(2)} ({pct.toFixed(0)}%)</span>
                        </div>
                        <div className="w-full bg-neutral-100 dark:bg-neutral-800 h-1.5 rounded-full overflow-hidden">
                          <div style={{ width: `${pct}%` }} className="h-full rounded-full" style={{ backgroundColor: item.color }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

            <select value={filterType} onChange={(e) => setFilterType(e.target.value)} className="bg-neutral-50 dark:bg-neutral-950 border border-neutral-250 dark:border-neutral-800 p-2 rounded-xl text-xs outline-none text-neutral-700 dark:text-neutral-200">
              <option value="all">Meio de Pagamento (Todos)</option>
              <option value="Pix">Pix / Transferência</option>
              <option value="Crédito">Cartão de Crédito</option>
              <option value="Débito">Débito</option>
              <option value="Boleto">Boleto</option>
              <option value="Dinheiro">Dinheiro</option>
            </select>
          </div>

          <div className="overflow-x-auto">
            <table className="w-full text-left text-xs min-w-[550px]">
              <thead>
                <tr className="border-b border-neutral-100 dark:border-neutral-800 text-[10px] uppercase font-bold text-neutral-400">
                  <th className="py-2.5 px-3">Data</th>
                  <th className="py-2.5 px-3">Descrição</th>
                  <th className="py-2.5 px-3">Categoria</th>
                  <th className="py-2.5 px-3 text-right">Valor</th>
                  <th className="py-2.5 px-3 text-center">Status</th>
                  <th className="py-2.5 px-3 text-center">Ações</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-neutral-100 dark:divide-neutral-800">
                {filtered.length === 0 ? (
                  <tr><td colSpan={6} className="py-8 text-center text-neutral-400">Nenhum lançamento atende aos critérios.</td></tr>
                ) : (
                  filtered.sort((a,b) => b.date.localeCompare(a.date)).map(item => {
                    const cColor = categories.find(c => c.name === item.category)?.color || "#cbd5e1";
                    return (
                      <tr key={item.id} className="hover:bg-neutral-50/50 dark:hover:bg-neutral-850/10">
                        <td className="py-3 px-3 font-mono text-neutral-400">{item.date}</td>
                        <td className="py-3 px-3 font-semibold text-neutral-850 dark:text-neutral-100">{item.description}<span className="text-[10px] text-neutral-400 block font-normal">{item.type}</span></td>
                        <td className="py-3 px-3"><span className="px-2 py-0.5 text-[9px] text-white rounded-full font-bold" style={{ backgroundColor: cColor }}>{item.category}</span></td>
                        <td className="py-3 px-3 text-right font-bold text-neutral-800 dark:text-neutral-200">R$ {item.value.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</td>
                        <td className="py-3 px-3 text-center">
                          <button onClick={() => onToggleStatus(item.id)} className={`px-2 py-0.5 text-[10px] font-bold rounded-full cursor-pointer ${item.isPaid ? "bg-emerald-50 text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-400" : "bg-amber-50 text-amber-700 dark:bg-amber-950/40 dark:text-amber-400"}`}>{item.isPaid ? "Liquidado" : "Pendente"}</button>
                        </td>
                        <td className="py-3 px-3 text-center">
                          <button onClick={() => onDeleteTransaction(item.id)} className="text-neutral-400 hover:text-rose-500 cursor-pointer"><LucideIcon name="Trash2" className="w-4 h-4" /></button>

                      </tr>
                    );
                  })
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // -------------------------------------------------------------
    // Credit Card Wallet lists & biometric scan
    // -------------------------------------------------------------
    function CreditCardList({ cards, onAddCard, onDeleteCard, biometricEnabled }) {
      const [showAdd, setShowAdd] = useState(false);
      const [cardName, setCardName] = useState("");
      const [lastFour, setLastFour] = useState("");
      const [limit, setLimit] = useState("");
      const [dueDate, setDueDate] = useState("10");
      const [closingDate, setClosingDate] = useState("3");
      const [network, setNetwork] = useState("mastercard");
      const [color, setColor] = useState("from-[#8A05BE] to-[#510472]");

      const [biometricTargetCard, setBiometricTargetCard] = useState(null);
      const [unlockedCardIds, setUnlockedCardIds] = useState([]);
      const [scanStatus, setScanStatus] = useState("idle"); // idle, scanning, success

      const executeBiometricScan = (card) => {
        if (!biometricEnabled || unlockedCardIds.includes(card.id)) return;
        setBiometricTargetCard(card);
        setScanStatus("scanning");
        setTimeout(() => {
          setScanStatus("success");
          setTimeout(() => {
            setUnlockedCardIds(prev => [...prev, card.id]);
            setBiometricTargetCard(null);
            setScanStatus("idle");
          }, 1000);
        }, 1800);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!cardName || !lastFour || !limit) return;
        onAddCard({ name: cardName, lastFour: lastFour.substring(0, 4), limit: parseFloat(limit), dueDate: parseInt(dueDate), closingDate: parseInt(closingDate), network, color });
        setCardName(""); setLastFour(""); setLimit(""); setShowAdd(false);
      };

      return (
        <div className="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl p-6 shadow-sm space-y-6">
          <div className="flex justify-between items-center">
            <div>
              <h3 className="font-semibold text-neutral-850 dark:text-neutral-100 text-base flex items-center gap-1.5"><LucideIcon name="CreditCard" className="w-5 h-5 text-indigo-500" /> Carteira de Cartões de Crédito</h3>
              <p className="text-xs text-neutral-400">Gerencie limites de crédito corporativos e faturas pessoais.</p>
            </div>
            <button onClick={() => setShowAdd(!showAdd)} className="flex items-center gap-1 bg-indigo-50 hover:bg-indigo-100 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400 px-3 py-1.5 rounded-xl text-xs font-semibold cursor-pointer"><LucideIcon name="Plus" className="w-4 h-4" /> Novo Cartão</button>
          </div>

          {showAdd && (
            <form onSubmit={handleSubmit} className="p-4 bg-neutral-50 dark:bg-neutral-850 border border-neutral-200 dark:border-neutral-800 rounded-xl space-y-4 text-xs animate-fadeIn">
              <h4 className="font-bold text-neutral-600">Novo Cartão de Crédito</h4>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" placeholder="Nome do Cartão (Ex Nubank)" required value={cardName} onChange={(e) => setCardName(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none" />
                <input type="number" placeholder="Últimos 4 Dígitos" maxLength="4" required value={lastFour} onChange={(e) => setLastFour(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none" />
                <input type="number" placeholder="Limite de Crédito R$" required value={limit} onChange={(e) => setLimit(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none" />
                <select value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none">
                  <option value="5">Vence dia 5</option>
                  <option value="10">Vence dia 10</option>
                  <option value="15">Vence dia 15</option>
                  <option value="20">Vence dia 20</option>
                  <option value="25">Vence dia 25</option>
                </select>
                <select value={network} onChange={(e) => setNetwork(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none">
                  <option value="mastercard">MasterCard</option>
                  <option value="visa">Visa</option>
                  <option value="elo">Elo</option>
                </select>
                <select value={color} onChange={(e) => setColor(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none font-semibold text-indigo-500">
                  <option value="from-[#8A05BE] to-[#510472]">Roxo (Nubank)</option>
                  <option value="from-[#EC7000] to-[#A33D00]">Laranja (Itaú)</option>
                  <option value="from-neutral-800 to-neutral-950">Preto (Inter Black)</option>
                </select>
              </div>
              <div className="flex justify-end gap-2"><button type="button" onClick={() => setShowAdd(false)} className="bg-neutral-200 p-1.5 rounded-lg font-bold">Cancelar</button><button type="submit" className="bg-indigo-500 hover:bg-indigo-600 text-white p-1.5 rounded-lg font-bold">Salvar Cartão</button></div>
            </form>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            {cards.map(card => {
              const isLocked = biometricEnabled && !unlockedCardIds.includes(card.id);
              const percent = card.limit > 0 ? (card.spent / card.limit) * 100 : 0;

              return (
                <div key={card.id} className="relative overflow-hidden p-5 rounded-2xl bg-gradient-to-br text-white shadow-md flex flex-col justify-between aspect-[1.58/1]" style={{ backgroundImage: `linear-gradient(to bottom right, var(--tw-gradient-stops))` }} className={`bg-gradient-to-br ${card.color} text-white p-5 rounded-2xl aspect-[1.58/1] flex flex-col justify-between relative shadow-lg`}>
                  <div className="flex justify-between items-start">
                    <div>
                      <h4 className="font-bold text-sm tracking-wide">{card.name}</h4>
                      <span className="text-[10px] font-mono opacity-80">**** **** **** {card.lastFour}</span>
                    </div>
                    <span className="text-[10px] uppercase tracking-widest font-extrabold px-2 py-0.5 bg-white/20 rounded-full">{card.network}</span>
                  </div>

                  {isLocked ? (
                    <div className="absolute inset-0 bg-neutral-950/85 backdrop-blur-xs flex flex-col justify-center items-center text-center p-4">
                      <LucideIcon name="Fingerprint" className="w-8 h-8 text-indigo-400 animate-pulse mb-2 cursor-pointer" />
                      <span className="text-[10px] font-bold tracking-wider uppercase">Fatura Bloqueada</span>
                      <button onClick={() => executeBiometricScan(card)} className="mt-2 text-[9px] bg-indigo-500/30 text-indigo-300 border border-indigo-500/40 px-2.5 py-1 rounded-xl hover:bg-indigo-500 hover:text-white cursor-pointer font-bold">Autenticar Biometria</button>
                    </div>
                  ) : (
                    <div>
                      <div className="flex justify-between text-[10px] mb-1 opacity-90 font-medium"><span>Fatura Atual</span><span>Disponível: R$ {(card.limit - card.spent).toFixed(0)}</span></div>
                      <h3 className="text-xl font-bold">R$ {card.spent.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</h3>
                      <div className="w-full bg-white/20 h-1 rounded-full mt-2 overflow-hidden">
                        <div style={{ width: `${Math.min(percent, 100)}%` }} className="h-full bg-emerald-400" />
                      </div>
                      <div className="flex justify-between text-[8px] opacity-75 mt-1"><span>Limite: R$ {card.limit}</span><button onClick={() => onDeleteCard(card.id)} className="text-rose-300 hover:text-rose-500 font-bold cursor-pointer">Excluir</button></div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Biometrics Simulator Overlay Dialog */}
          {biometricTargetCard && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-xs flex items-center justify-center">
              <div className="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 p-6 rounded-2xl shadow-2xl max-w-xs text-center space-y-4 animate-scaleUp">
                <div className="w-14 h-14 bg-indigo-50 dark:bg-indigo-950/50 rounded-full flex items-center justify-center mx-auto text-indigo-500 dark:text-indigo-400">
                  <LucideIcon name="Fingerprint" className={`w-8 h-8 ${scanStatus === "scanning" ? "animate-pulse" : ""}`} />
                </div>
                <div>
                  <h4 className="font-bold text-neutral-850 dark:text-neutral-150 text-sm">Validando FaceID / Biometria</h4>
                  <p className="text-[10px] text-neutral-400 mt-1">Insira seu dedo no scanner simulado ou olhe para a câmera.</p>
                </div>
                <div className="text-xs font-bold text-neutral-550 dark:text-neutral-300">
                  {scanStatus === "scanning" ? "Escaneando camada dactilar..." : "Aprovado com Sucesso!"}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // -------------------------------------------------------------
    // Open Finance Sincronizer Integration wizard
    // -------------------------------------------------------------
    function IntegrationWizard({ banks, onToggleBankConnection }) {
      const [selected, setSelected] = useState(null);
      const [step, setStep] = useState("idle"); // idle, intro, credential, TLS, ok
      const [agency, setAgency] = useState("");
      const [account, setAccount] = useState("");

      const handleStart = (b) => { setSelected(b); setStep("intro"); setAgency(""); setAccount(""); };

      const handleConnect = () => {
        if (!agency || !account) return;
        setStep("TLS");
        setTimeout(() => {
          const mockTxs = [
            { id: `tx-nubank-${Math.random()}`, description: `Estorno de Tarifa ${selected.bankName}`, value: 15.0, date: new Date().toISOString().split("T")[0], category: "Outros", type: "Pix", isPaid: true },
            { id: `tx-nubank-${Math.random()}`, description: `Padaria Santo Trigo (Sync)`, value: 24.50, date: new Date().toISOString().split("T")[0], category: "Alimentação", type: "Débito", isPaid: true }
          ];
          onToggleBankConnection(selected.id, true, mockTxs, []);
          setStep("ok");
        }, 2200);
      };

      return (
        <div className="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl p-6 shadow-sm space-y-5">
          <div>
            <h3 className="font-semibold text-neutral-850 dark:text-neutral-100 text-base flex items-center gap-1.5"><LucideIcon name="ShieldCheck" className="w-5 h-5 text-emerald-500" /> Sincronização Bancária Open Finance</h3>
            <p className="text-xs text-neutral-400">Vincule cartões de crédito e extratos com APIs criptografadas.</p>
          </div>

          {step === "idle" ? (
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
              {banks.map(b => (
                <div key={b.id} className={`p-4 border rounded-2xl flex flex-col items-center justify-between transition-all text-center ${b.connected ? "border-emerald-300 bg-emerald-50/10 dark:border-emerald-800/40" : "border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-900"}`}>
                  <div className="w-10 h-10 bg-indigo-500 text-white rounded-full flex items-center justify-center font-black text-sm mb-2">{b.bankName.substring(0,2).toUpperCase()}</div>
                  <span className="text-xs font-bold text-neutral-800 dark:text-neutral-100 truncate w-full">{b.bankName}</span>
                  <span className="text-[9px] text-neutral-400">{b.connected ? "Conectado" : "Desativado"}</span>
                  <button onClick={() => b.connected ? onToggleBankConnection(b.id, false) : handleStart(b)} className="mt-2.5 text-[10px] font-bold text-indigo-500 hover:underline cursor-pointer">{b.connected ? "Desconectar" : "Vincular"}</button>
                </div>
              ))}
            </div>
          ) : (
            <div className="bg-neutral-50 dark:bg-neutral-850 border border-neutral-200 dark:border-neutral-800 p-5 rounded-xl text-center space-y-4 max-w-sm mx-auto animate-scaleUp text-xs">
              {step === "intro" && (
                <>
                  <LucideIcon name="Link2" className="w-8 h-8 text-indigo-500 mx-auto" />
                  <h4 className="font-bold text-neutral-800 dark:text-neutral-150">Vincular {selected.bankName}</h4>
                  <p className="text-[10px] text-neutral-400">Você autorizará o compartilhamento de dados cadastrais e faturas sob regulação do Banco Central.</p>
                  <button onClick={() => setStep("credential")} className="bg-indigo-500 text-white text-xs px-4 py-2 rounded-xl font-bold cursor-pointer">Continuar</button>
                </>
              )}

              {step === "credential" && (
                <div className="space-y-3 text-left">
                  <h4 className="font-bold text-center">Credenciais Open Finance</h4>
                  <input type="number" placeholder="Agência (Ex: 0001)" value={agency} onChange={(e) => setAgency(e.target.value)} className="w-full p-2 border rounded-lg bg-white dark:bg-neutral-900 text-xs" />
                  <input type="number" placeholder="Conta Corrente & DV" value={account} onChange={(e) => setAccount(e.target.value)} className="w-full p-2 border rounded-lg bg-white dark:bg-neutral-900 text-xs" />
                  <button onClick={handleConnect} className="w-full bg-indigo-500 text-white text-xs py-2 rounded-xl font-bold cursor-pointer">Autorizar e Assinar Consentimento</button>
                </div>
              )}

              {step === "TLS" && (
                <div className="py-4 space-y-2">
                  <LucideIcon name="RefreshCw" className="w-7 h-7 text-indigo-500 animate-spin mx-auto" />
                  <p className="font-bold">Iniciando handshake TLS criptografado...</p>
                  <span className="text-[9px] text-neutral-400">Conectando ao sandbox regulado do Open Finance do Brasil</span>
                </div>
              )}

              {step === "ok" && (
                <div className="space-y-2">
                  <LucideIcon name="Check" className="w-8 h-8 text-emerald-500 mx-auto" />
                  <p className="font-bold text-emerald-700">Canal Ativo com Sucesso!</p>
                  <span className="text-[10px] text-neutral-400 block">Extrato de faturas do {selected.bankName} sincronizado com a carteira.</span>
                  <button onClick={() => setStep("idle")} className="bg-neutral-200 dark:bg-neutral-800 px-4 py-1.5 rounded-lg font-bold">Concluir</button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // -------------------------------------------------------------
    // Bill Reminders Checklist scheduler
    // -------------------------------------------------------------
    function RemindersModule({ reminders, onAddReminder, onToggleReminderPaid, onDeleteReminder, pushEnabled, onToast }) {
      const [showAdd, setShowAdd] = useState(false);
      const [title, setTitle] = useState("");
      const [value, setValue] = useState("");
      const [dueDate, setDueDate] = useState(() => new Date().toISOString().split("T")[0]);
      const [category, setCategory] = useState("Moradia");
      const [autoDebit, setAutoDebit] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!title || !value) return;
        onAddReminder({ title, value: parseFloat(value), dueDate, category, isPaid: false, autoDebit });
        if (pushEnabled) onToast(`🔔 Alerta de vencimento configurado! Enviaremos uma notificação antes do vencimento.`);
        setTitle(""); setValue(""); setAutoDebit(false); setShowAdd(false);
      };

      const checkIsOverdue = (dStr) => {
        const today = new Date(); today.setHours(0,0,0,0);
        const due = new Date(dStr); due.setHours(0,0,0,0);
        return due < today;
      };

      const pending = reminders.filter(r => !r.isPaid);
      const paid = reminders.filter(r => r.isPaid);

      return (
        <div className="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl p-6 shadow-sm space-y-6">
          <div className="flex justify-between items-center pb-4 border-b border-neutral-100 dark:border-neutral-800">
            <div>
              <h3 className="font-semibold text-neutral-850 dark:text-neutral-100 text-base flex items-center gap-1.5"><LucideIcon name="Bell" className="w-5 h-5 text-indigo-500" /> Agenda de Vencimento de Boletos</h3>
              <p className="text-xs text-neutral-400">Controle faturas recorrentes de consumo e faturas fixas.</p>
            </div>
            <button onClick={() => setShowAdd(!showAdd)} className="flex items-center gap-1 bg-indigo-50 hover:bg-indigo-100 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400 px-3 py-1.5 rounded-xl text-xs font-semibold cursor-pointer"><LucideIcon name="Plus" className="w-4 h-4" /> Nova Fatura</button>
          </div>

          {showAdd && (
            <form onSubmit={handleSubmit} className="p-4 bg-neutral-50 dark:bg-neutral-850 border border-neutral-200 dark:border-neutral-800 rounded-xl space-y-4 text-xs animate-fadeIn">
              <h4 className="font-bold text-neutral-600">Agendar Novo Boleto</h4>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" placeholder="Nome / Cedente (Ex Aluguel)" required value={title} onChange={(e) => setTitle(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none" />
                <input type="number" placeholder="Valor do Compromisso" required value={value} onChange={(e) => setValue(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none" />
                <input type="date" required value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none" />
                <select value={category} onChange={(e) => setCategory(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none">
                  <option value="Moradia">Moradia</option>
                  <option value="Saúde">Saúde</option>
                  <option value="Lazer">Lazer</option>
                  <option value="Alimentação">Alimentação</option>
                  <option value="Outros">Outros</option>
                </select>
                <div className="flex items-center gap-2">
                  <input type="checkbox" id="chkAuto" checked={autoDebit} onChange={(e) => setAutoDebit(e.target.checked)} className="rounded text-indigo-500 cursor-pointer" />
                  <label htmlFor="chkAuto" className="text-neutral-600 dark:text-neutral-400 cursor-pointer select-none">Débito Automático Bancário</label>
                </div>
              </div>
              <div className="flex justify-end gap-2"><button type="button" onClick={() => setShowAdd(false)} className="bg-neutral-200 p-1.5 rounded-lg font-bold">Cancelar</button><button type="submit" className="bg-indigo-500 text-white p-1.5 rounded-lg font-bold">Confirmar</button></div>
            </form>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="space-y-3">
              <h4 className="text-[10px] font-bold uppercase text-neutral-400 flex items-center gap-1"><LucideIcon name="Calendar" className="w-3.5 h-3.5" /> Boletos Pendentes ({pending.length})</h4>
              {pending.length === 0 ? (
                <p className="text-xs text-neutral-400 italic">Parabéns! Nenhuma fatura pendente cadastrada.</p>
              ) : (
                pending.map(rem => {
                  const late = checkIsOverdue(rem.dueDate);
                  return (
                    <div key={rem.id} className={`p-3 border rounded-xl flex justify-between items-center ${late ? "border-rose-300 bg-rose-50/10" : "border-neutral-200 dark:border-neutral-800"}`}>
                      <div className="flex items-center gap-3">
                        <button onClick={() => onToggleReminderPaid(rem.id)} className="text-neutral-400 hover:text-emerald-500 cursor-pointer"><LucideIcon name="Circle" className="w-5 h-5" /></button>
                        <div>
                          <p className="text-xs font-bold text-neutral-800 dark:text-neutral-100">{rem.title}</p>
                          <span className="text-[9px] text-neutral-400 block font-semibold">{rem.dueDate} {rem.autoDebit && "• Débito Automático"}</span>
                        </div>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className={`text-xs font-bold ${late ? "text-rose-500" : "text-neutral-800 dark:text-neutral-200"}`}>R$ {rem.value.toFixed(2)}</span>
                        <button onClick={() => onDeleteReminder(rem.id)} className="text-neutral-400 hover:text-rose-500 cursor-pointer"><LucideIcon name="Trash2" className="w-3.5 h-3.5" /></button>
                      </div>
                    </div>
                  );
                })
              )}
            </div>

            <div className="space-y-3">
              <h4 className="text-[10px] font-bold uppercase text-neutral-400 flex items-center gap-1"><LucideIcon name="Check" className="w-3.5 h-3.5 text-emerald-500" /> Boletos Liquidados ({paid.length})</h4>
              {paid.length === 0 ? (
                <p className="text-xs text-neutral-400 italic">Nenhum boleto liquidado no histórico ainda.</p>
              ) : (
                <div className="space-y-2 opacity-75">
                  {paid.map(rem => (
                    <div key={rem.id} className="p-2 border border-neutral-100 dark:border-neutral-800 rounded-lg flex justify-between items-center text-xs">
                      <span className="font-semibold text-neutral-500 line-through">{rem.title}</span>
                      <span className="font-bold text-neutral-400">R$ {rem.value.toFixed(2)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // -------------------------------------------------------------
    // Categories customizer & budget allocations
    // -------------------------------------------------------------
    function CategoryCustomizer({ categories, onAddCategory, onDeleteCategory, onUpdateBudget }) {
      const [showAdd, setShowAdd] = useState(false);
      const [name, setName] = useState("");
      const [color, setColor] = useState("#EC6E34");
      const [icon, setIcon] = useState("Utensils");
      const [budget, setBudget] = useState("500");

      const [editingId, setEditingId] = useState(null);
      const [editingVal, setEditingVal] = useState("");

      const handleCreate = (e) => {
        e.preventDefault();
        if (!name) return;
        onAddCategory({ id: "cat-" + Math.random().toString(36).substring(2,9), name, color, icon, budget: parseFloat(budget) || 0 });
        setName(""); setShowAdd(false);
      };

      return (
        <div className="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl p-6 shadow-sm space-y-5">
          <div className="flex justify-between items-center">
            <div>
              <h3 className="font-semibold text-neutral-850 dark:text-neutral-100 text-base flex items-center gap-1.5"><LucideIcon name="Sliders" className="w-5 h-5 text-indigo-500" /> Categorias & Orçamentos</h3>
              <p className="text-xs text-neutral-400">Personalize tetos máximos orçamentários por setor.</p>
            </div>
            <button onClick={() => setShowAdd(!showAdd)} className="flex items-center gap-1 bg-indigo-50 hover:bg-indigo-100 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400 px-3 py-1.5 rounded-xl text-xs font-semibold cursor-pointer"><LucideIcon name="Plus" className="w-4 h-4" /> Nova Categoria</button>
          </div>

          {showAdd && (
            <form onSubmit={handleCreate} className="p-4 bg-neutral-50 dark:bg-neutral-850 border border-neutral-200 dark:border-neutral-800 rounded-xl space-y-4 text-xs animate-fadeIn">
              <h4 className="font-bold text-neutral-600">Criar Categoria</h4>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" placeholder="Nome (Ex: Viagens)" required value={name} onChange={(e) => setName(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none" />
                <input type="number" placeholder="Teto Limite Mensal R$" required value={budget} onChange={(e) => setBudget(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none" />
                <div>
                  <label className="block text-neutral-450 mb-1">Selecione Cor de Destaque</label>
                  <input type="color" value={color} onChange={(e) => setColor(e.target.value)} className="w-12 h-8 rounded border-none cursor-pointer bg-transparent" />
                </div>
                <div>
                  <label className="block text-neutral-450 mb-1">Ícone Temático</label>
                  <select value={icon} onChange={(e) => setIcon(e.target.value)} className="bg-white dark:bg-neutral-900 p-2 border border-neutral-200 dark:border-neutral-800 rounded-xl outline-none">
                    <option value="Utensils">Utensils (Alimentação)</option>
                    <option value="Car">Car (Transporte)</option>
                    <option value="Gamepad">Gamepad (Lazer)</option>
                    <option value="Home">Home (Moradia)</option>
                    <option value="Heart">Heart (Saúde)</option>
                    <option value="ShoppingBag">ShoppingBag (Mercado)</option>
                    <option value="Percent">Percent (Outros)</option>
                  </select>
                </div>
              </div>
              <div className="flex justify-end gap-2"><button type="button" onClick={() => setShowAdd(false)} className="bg-neutral-200 p-1.5 rounded-lg font-bold">Cancelar</button><button type="submit" className="bg-indigo-500 text-white p-1.5 rounded-lg font-bold">Criar</button></div>
            </form>
          )}

          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            {categories.map(cat => (
              <div key={cat.id} className="p-4 border border-neutral-200 dark:border-neutral-800 rounded-2xl flex flex-col justify-between hover:shadow-sm">
                <div className="flex justify-between items-start">
                  <div className="flex items-center gap-2.5">
                    <span className="w-8 h-8 rounded-xl flex items-center justify-center text-white text-sm" style={{ backgroundColor: cat.color }}><LucideIcon name={cat.icon} className="w-4 h-4" /></span>
                    <div>
                      <h4 className="font-bold text-xs text-neutral-800 dark:text-neutral-100">{cat.name}</h4>
                      <span className="text-[9px] text-neutral-400 font-semibold">Teto: R$ {cat.budget || "Sem Limite"}</span>
                    </div>
                  </div>
                  {!["Alimentação", "Transporte", "Moradia", "Saúde"].includes(cat.name) && (
                    <button onClick={() => onDeleteCategory(cat.id)} className="text-neutral-400 hover:text-rose-500 cursor-pointer"><LucideIcon name="Trash2" className="w-4 h-4" /></button>
                  )}
                </div>

                <div className="mt-3 pt-3 border-t border-neutral-100 dark:border-neutral-800/60 flex justify-between items-center text-[10px]">
                  {editingId === cat.id ? (
                    <div className="flex gap-1 items-center w-full">
                      <input type="number" value={editingVal} onChange={(e) => setEditingVal(e.target.value)} className="w-full p-1 border rounded bg-white dark:bg-neutral-900 text-xs" />
                      <button onClick={() => { onUpdateBudget(cat.id, parseFloat(editingVal) || 0); setEditingId(null); }} className="p-1 bg-emerald-500 text-white rounded"><LucideIcon name="Check" className="w-3.5 h-3.5" /></button>
                    </div>
                  ) : (
                    <>
                      <span className="text-neutral-450">Teto Mensal</span>
                      <button onClick={() => { setEditingId(cat.id); setEditingVal(cat.budget?.toString() || ""); }} className="text-indigo-500 hover:underline font-bold flex items-center gap-0.5"><LucideIcon name="Edit3" className="w-3 h-3" /> Alterar</button>
                    </>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // -------------------------------------------------------------
    // Cloud security backup local togglers
    // -------------------------------------------------------------
    function CloudSecurityPanel({ settings, onUpdateSettings, onLocalExport, onLocalImport }) {
      const handleFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          if (typeof event.target?.result === "string") {
            onLocalImport(event.target.result);
          }
        };
        reader.readAsText(file);
      };

      return (
        <div className="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl p-6 shadow-sm space-y-6 text-xs">
          <div>
            <h3 className="font-semibold text-neutral-850 dark:text-neutral-100 text-base">Segurança & Usabilidade</h3>
            <p className="text-xs text-neutral-400">Habilite recursos adicionais de segurança local e backup offline.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 font-bold">
            <button onClick={() => onUpdateSettings({ darkMode: !settings.darkMode })} className="p-4 border border-neutral-200 dark:border-neutral-800 rounded-xl flex justify-between items-center bg-neutral-50/25 cursor-pointer hover:bg-neutral-100/50">
              <div><span className="block text-neutral-800 dark:text-neutral-200 text-xs">Modo Escuro</span><span className="text-[9px] font-normal text-neutral-400">Layout noturno</span></div>
              <div className="p-2 bg-indigo-50 dark:bg-indigo-950 rounded-lg text-indigo-500"><LucideIcon name={settings.darkMode ? "Moon" : "Sun"} className="w-4 h-4" /></div>
            </button>

            <button onClick={() => onUpdateSettings({ biometricEnabled: !settings.biometricEnabled })} className="p-4 border border-neutral-200 dark:border-neutral-800 rounded-xl flex justify-between items-center bg-neutral-50/25 cursor-pointer hover:bg-neutral-100/50">
              <div><span className="block text-neutral-800 dark:text-neutral-200 text-xs">Biometria Fatura</span><span className="text-[9px] font-normal text-neutral-400">Proteção biométrica faturas</span></div>
              <div className={`p-2 rounded-lg text-white ${settings.biometricEnabled ? "bg-emerald-500" : "bg-neutral-300 dark:bg-neutral-800 text-neutral-500"}`}><LucideIcon name="Fingerprint" className="w-4 h-4" /></div>
            </button>

            <button onClick={() => onUpdateSettings({ pushNotificationsEnabled: !settings.pushNotificationsEnabled })} className="p-4 border border-neutral-200 dark:border-neutral-800 rounded-xl flex justify-between items-center bg-neutral-50/25 cursor-pointer hover:bg-neutral-100/50">
              <div><span className="block text-neutral-800 dark:text-neutral-200 text-xs">Notificações Push</span><span className="text-[9px] font-normal text-neutral-400">Alarmes de vencimento</span></div>
              <div className={`p-2 rounded-lg text-white ${settings.pushNotificationsEnabled ? "bg-indigo-500 animate-pulse" : "bg-neutral-300 dark:bg-neutral-800 text-neutral-500"}`}><LucideIcon name="Bell" className="w-4 h-4" /></div>
            </button>
          </div>

          <div className="pt-4 border-t border-neutral-100 dark:border-neutral-800/60">
            <h4 className="font-bold mb-1">Cópia de Segurança Local (JSON Backup)</h4>
            <p className="text-[10px] text-neutral-400 mb-3">Baixe um snapshot dos seus dados para restaurar quando quiser em qualquer computador.</p>
            <div className="flex gap-3">
              <button onClick={onLocalExport} className="flex items-center gap-1.5 bg-neutral-100 hover:bg-neutral-200 dark:bg-neutral-800 dark:hover:bg-neutral-700 text-neutral-700 dark:text-neutral-300 px-3 py-1.5 rounded-lg cursor-pointer font-semibold"><LucideIcon name="DownloadCloud" className="w-4 h-4" /> Exportar Backup</button>
              <label className="flex items-center gap-1.5 bg-neutral-100 hover:bg-neutral-200 dark:bg-neutral-800 dark:hover:bg-neutral-700 text-neutral-700 dark:text-neutral-300 px-3 py-1.5 rounded-lg cursor-pointer font-semibold">
                <LucideIcon name="UploadCloud" className="w-4 h-4" /> Importar Backup
                <input type="file" accept=".json" onChange={handleFile} className="hidden" />
              </label>
            </div>
          </div>
        </div>
      );
    }

    // RENDER REACT APP TO THE DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
